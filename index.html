<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  getDocs,
  where,
  deleteDoc,
  doc,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyCyVCJ6QvOnanx4A0wQADVtemPC9Jka_dI",

  projectId: "h8af-8902d",

  messagingSenderId: "763106464913",
  appId: "1:763106464913:web:05d60cb00dd10ac3c99b30",
  measurementId: "G-C30B6QYXH5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";
    let isAdmin = false;

const ADMIN_USERNAME = "Turk_Tco";
    const savedUser = localStorage.getItem("h8af_username");

if(savedUser){

    currentUser = savedUser;

    window.addEventListener("load", () => {

        document.getElementById("loginPage")
            .style.display = "none";

        document.getElementById("chatPage")
            .style.display = "block";
        if(isAdmin){
    document.getElementById("adminPanel")
        .style.display = "block";
}
    });
}
const q = query(
    collection(db, "messages"),
    orderBy("createdAt")
);
const announcementQuery = query(
    collection(db, "announcements"),
    orderBy("createdAt")
);

onSnapshot(
    announcementQuery,
    (snapshot) => {

        const box =
            document.getElementById(
                "announcementBox"
            );

        box.innerHTML = "";

        snapshot.forEach((doc) => {

            const data = doc.data();

            box.innerHTML +=
                "<div style='background:#ff9800;padding:10px;border-radius:10px;margin-bottom:10px;'><b>📢 DUYURU:</b> "
                + data.text +
                "</div>";
        });
    }
);
    
onSnapshot(q, (snapshot) => {

    const messages =
        document.getElementById("messages");

    messages.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

        const div =
            document.createElement("div");

        div.className = "message";

        div.innerHTML =
            "<b>" +
            data.user +
            ":</b> " +
            data.text;

        messages.appendChild(div);
    });

    messages.scrollTop =
        messages.scrollHeight;
});
async function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(username.trim() === "" ||
       password.trim() === ""){

        alert("Kullanıcı adı ve şifre gir.");
        return;
    }

    const q = query(
        collection(db, "users"),
        where("username", "==", username)
    );

    const snapshot =
        await getDocs(q);

    if(snapshot.empty){

        alert("Kullanıcı bulunamadı.");
        return;
    }

    let correctPassword = false;

    snapshot.forEach((doc) => {

        const data = doc.data();

        if(data.password === password){
            correctPassword = true;
        }
    });

    if(!correctPassword){

        alert("Şifre yanlış.");
        return;
    }

    currentUser = username;
    isAdmin = (username === ADMIN_USERNAME);

    document.getElementById("loginPage")
        .style.display = "none";

    document.getElementById("chatPage")
        .style.display = "block";
if(isAdmin){
    document.getElementById("adminPanel")
        .style.display = "block";
}
}
    
function logout(){
document.getElementById("adminPanel")
    .style.display = "none";
    document.getElementById("chatPage")
        .style.display = "none";

    document.getElementById("loginPage")
        .style.display = "flex";
}

async function sendMessage(){

    const input =
        document.getElementById("messageInput");

    if(input.value.trim() === ""){
        return;
    }

    await addDoc(
        collection(db, "messages"),
        {
            user: currentUser,
            text: input.value,
            createdAt: serverTimestamp()
        }
    );

    input.value = "";

    const allMessages = await getDocs(
        query(
            collection(db, "messages"),
            orderBy("createdAt")
        )
    );

    if(allMessages.size > 100){

        const oldest =
            allMessages.docs[0];

        await deleteDoc(
            doc(
                db,
                "messages",
                oldest.id
            )
        );
    }
}
async function register(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(username.trim() === "" ||
       password.trim() === ""){
        

        alert("Kullanıcı adı ve şifre gir.");
        return;
    }
  
const userQuery = query(
    collection(db, "users"),
    where("username", "==", username)
);

const existingUsers =
    await getDocs(userQuery);

if(!existingUsers.empty){

    alert("Bu kullanıcı adı zaten alınmış.");

    return;
}
    await addDoc(
        collection(db, "users"),
        {
            username: username,
            password: password
        }
    );

    alert("Kayıt başarılı!");
}
async function sendAnnouncement(){

    const text =
        document.getElementById(
            "announcementInput"
        ).value;

    if(text.trim() === ""){
        return;
    }

    await addDoc(
        collection(db, "announcements"),
        {
            text: text,
            createdAt: serverTimestamp()
        }
    );
const allAnnouncements = await getDocs(
    query(
        collection(db, "announcements"),
        orderBy("createdAt")
    )
);

if(allAnnouncements.size > 1){

    const oldest =
        allAnnouncements.docs[0];

    await deleteDoc(
        doc(
            db,
            "announcements",
            oldest.id
        )
    );
}
    
    document.getElementById(
        "announcementInput"
    ).value = "";
}

function showPage(page){

    if(page === "home"){

        document.getElementById("minecraftSection")
            .style.display = "block";
    }

    if(page === "chat"){
        document.getElementById("chatSection")
            .style.display = "block";
    }
}
